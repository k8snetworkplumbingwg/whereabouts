# Default values for whereabouts.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/k8snetworkplumbingwg/whereabouts
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: v0.8.0

updateStrategy: RollingUpdate
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
namespaceOverride: "kube-system"
successfulJobsHistoryLimit: 0

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  #name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

# The CNI DaemonSet requires privileged root access to interact with the host
# network stack and write CNI binaries to the host filesystem (e.g. /opt/cni/bin).
# This is intentional and currently cannot be run as non-root.
securityContext:
  privileged: true
  runAsUser: 0

resources:
  requests:
    cpu: "100m"
    memory: "50Mi"
  limits:
    cpu: "100m"
    memory: "50Mi"

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists
    effect: NoSchedule

affinity: {}

priorityClassName: ""

cniConf:
  confDir: /etc/cni/net.d
  binDir: /opt/cni/bin

operator:
  enabled: true
  replicas: 2
  # Optional operator-specific scheduling constraints.
  # If empty, the chart falls back to top-level nodeSelector/tolerations.
  nodeSelector: {}
  tolerations: []
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # topologySpreadConstraints for HA zone distribution (optional)
  # Example:
  # topologySpreadConstraints:
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels:
  #       app: whereabouts-operator
  topologySpreadConstraints: []

webhook:
  # failurePolicy for the ValidatingWebhookConfiguration (Fail or Ignore).
  failurePolicy: Fail
  # ServiceAccount used by the CNI plugin — bypass webhooks for this SA
  cniServiceAccountName: whereabouts
