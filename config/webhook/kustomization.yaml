# Webhook kustomization
# manifests.yaml is generated by controller-gen from webhook markers.
# Do not edit manifests.yaml manually — run `make manifests` to regenerate.
#
# NOTE: The namespace (kube-system) and service account names (whereabouts,
# whereabouts-operator) are hardcoded in the CEL matchConditions below.
# If you deploy to a different namespace or use different service account
# names, update the expressions accordingly.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- manifests.yaml
- service.yaml
patches:
# Inject cert-controller CA injection annotation and CEL matchConditions
# to bypass validation for the CNI plugin ServiceAccount.
- target:
    group: admissionregistration.k8s.io
    version: v1
    kind: ValidatingWebhookConfiguration
  patch: |-
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: validating-webhook-configuration
      annotations:
        cert-controller.cert-rotation/inject-ca-from: kube-system/whereabouts-webhook-cert
    webhooks:
    - name: vippool.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts")
          && !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts-operator")
    - name: vnodeslicepool.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts")
          && !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts-operator")
    - name: voverlappingrangeipreservation.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts")
          && !(request.userInfo.username == "system:serviceaccount:kube-system:whereabouts-operator")
