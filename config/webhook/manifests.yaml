---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-whereabouts-cni-cncf-io-v1alpha1-ippool
  failurePolicy: Fail
  name: vippool.whereabouts.cni.cncf.io
  rules:
  - apiGroups:
    - whereabouts.cni.cncf.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - ippools
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-whereabouts-cni-cncf-io-v1alpha1-nodeslicepool
  failurePolicy: Fail
  name: vnodeslicepool.whereabouts.cni.cncf.io
  rules:
  - apiGroups:
    - whereabouts.cni.cncf.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - nodeslicepools
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-whereabouts-cni-cncf-io-v1alpha1-overlappingrangeipreservation
  failurePolicy: Fail
  name: voverlappingrangeipreservation.whereabouts.cni.cncf.io
  rules:
  - apiGroups:
    - whereabouts.cni.cncf.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - overlappingrangeipreservations
  sideEffects: None
