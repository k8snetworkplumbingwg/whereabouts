apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cni
  namespace: system
  labels:
    tier: node
    app: whereabouts
    name: whereabouts
    app.kubernetes.io/name: whereabouts
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      name: whereabouts
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: whereabouts
        name: whereabouts
    spec:
      hostNetwork: true
      serviceAccountName: cni # kustomize namePrefix will expand this
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: whereabouts
        command: ["/install-cni"]
        image: controller:latest
        env:
        - name: NODENAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: cnibin
          mountPath: /host/opt/cni/bin
        - name: cni-net-dir
          mountPath: /host/etc/cni/net.d
        - name: cni-args
          mountPath: /cni-args
      volumes:
      - name: cnibin
        hostPath:
          path: /opt/cni/bin
      - name: cni-net-dir
        hostPath:
          path: /etc/cni/net.d
      - name: cni-args
        hostPath:
          # Shared host directory used by the install-cni binary
          # to exchange CNI argument material with the running DaemonSet.
          # Kept for compatibility with existing deployment workflows.
          path: /var/run/whereabouts/cni-args
