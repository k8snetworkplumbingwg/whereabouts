# RBAC kustomization
# role.yaml is generated by controller-gen from +kubebuilder:rbac markers.
# Do not edit role.yaml manually — run `make manifests` to regenerate.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- role.yaml
- role_binding.yaml
- service_account.yaml
- leader_election_role.yaml
- leader_election_role_binding.yaml
