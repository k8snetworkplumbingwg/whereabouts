name: Image push release
on:
  push:
    tags:
      - v*

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_PUSH_OWNER: telekom

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Install Go
        uses: actions/setup-go@v6.3.0 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build and Test
        run: make test

  build-push:
    name: Build / ${{ matrix.platform }}
    needs: [test]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'telekom'
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Prepare platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Check out code
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3.7.0 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0 # v3.12.0

      - name: Login to Container Registry
        uses: docker/login-action@v3.7.0 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5.10.0 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.0.0 # v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7.0.0 # v7.0.0
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  assemble:
    name: Assemble Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build-push
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.0 # v8.0.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Container Registry
        uses: docker/login-action@v3.7.0 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0 # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5.10.0 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false

      - name: Create and push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        id: inspect
        run: |
          tag=$(jq -cr '.tags[0]' <<< '${{ steps.meta.outputs.json }}')
          digest=$(docker buildx imagetools inspect "${tag}" | awk '/^Digest:/ {print $2; exit}')
          if [ -z "${digest}" ]; then
            echo "Failed to extract manifest digest for ${tag}" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

  sign:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v3.7.0 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0 # v4.0.0

      - name: Sign image with Cosign (keyless)
        run: cosign sign --yes "${{ needs.assemble.outputs.image }}@${{ needs.assemble.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.23.0 # v0.23.0
        with:
          image: ${{ needs.assemble.outputs.image }}@${{ needs.assemble.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Attest SBOM with Cosign
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${{ needs.assemble.outputs.image }}@${{ needs.assemble.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0 # v4.1.0
        with:
          subject-name: ${{ needs.assemble.outputs.image }}
          subject-digest: ${{ needs.assemble.outputs.digest }}
          push-to-registry: true
